<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Auth | Pavan X DHEE CODING LAB</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, 'Inter', sans-serif;
            background: linear-gradient(145deg, #0a0f1e 0%, #0c1222 100%);
            color: #eef2ff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .auth-container {
            max-width: 500px;
            width: 100%;
            background: rgba(20, 27, 45, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            padding: 2.2rem;
            border: 1px solid rgba(99, 102, 241, 0.3);
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.5);
            animation: fadeInUp 0.5s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .logo h1 {
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff, #a5b4fc, #818cf8);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .logo p {
            font-size: 0.75rem;
            color: #8b92b0;
            margin-top: 0.3rem;
        }

        .badge {
            display: inline-block;
            background: rgba(99, 102, 241, 0.2);
            border: 1px solid rgba(99, 102, 241, 0.4);
            padding: 0.2rem 0.9rem;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 500;
            color: #a5b4fc;
            margin-bottom: 0.8rem;
        }

        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid #2d3a5e;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 0.8rem;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
            color: #9ca3c7;
            border-bottom: 2px solid transparent;
        }

        .tab.active {
            color: #a5b4fc;
            border-bottom-color: #6366f1;
        }

        .tab:hover {
            color: #eef2ff;
        }

        .form-panel {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .form-panel.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .input-group {
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            margin-bottom: 0.4rem;
            font-size: 0.85rem;
            font-weight: 500;
            color: #cbd5e1;
        }

        label .required {
            color: #ef4444;
            margin-left: 0.2rem;
        }

        input, select {
            width: 100%;
            padding: 0.8rem 1rem;
            background: rgba(15, 23, 42, 0.7);
            border: 1px solid #2d3a5e;
            border-radius: 1rem;
            font-size: 0.95rem;
            color: #eef2ff;
            transition: all 0.2s;
            font-family: inherit;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
            background: #0f172a;
        }

        input::placeholder, select::placeholder {
            color: #5b6b8c;
        }

        .name-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .checkbox-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
        }

        .checkbox {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .checkbox input {
            width: auto;
            width: 18px;
            height: 18px;
            accent-color: #6366f1;
        }

        .forgot-link {
            color: #a5b4fc;
            text-decoration: none;
            transition: 0.2s;
            font-size: 0.85rem;
        }

        .forgot-link:hover {
            color: #818cf8;
            text-decoration: underline;
        }

        .auth-btn {
            width: 100%;
            background: #6366f1;
            color: white;
            font-weight: 700;
            padding: 0.9rem;
            border-radius: 1rem;
            border: none;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 1.2rem;
            font-family: inherit;
        }

        .auth-btn:hover {
            background: #4f52e0;
            transform: scale(0.98);
        }

        .error-message {
            background: rgba(220, 38, 38, 0.15);
            border-left: 3px solid #ef4444;
            padding: 0.7rem;
            border-radius: 0.8rem;
            margin-bottom: 1rem;
            font-size: 0.8rem;
            color: #fecaca;
            display: none;
        }

        .success-message {
            background: rgba(34, 197, 94, 0.15);
            border-left: 3px solid #22c55e;
            padding: 0.7rem;
            border-radius: 0.8rem;
            margin-bottom: 1rem;
            font-size: 0.8rem;
            color: #bbf7d0;
            display: none;
        }

        .back-home {
            text-align: center;
            margin-top: 1.5rem;
        }

        .back-home a {
            color: #7c85b0;
            text-decoration: none;
            font-size: 0.8rem;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }

        .back-home a:hover {
            color: #a5b4fc;
        }

        hr {
            border-color: #1e293b;
            margin: 1rem 0;
        }

        .strength-meter {
            margin-top: 0.4rem;
            height: 4px;
            background: #2d3a5e;
            border-radius: 4px;
            overflow: hidden;
        }

        .strength-bar {
            height: 100%;
            width: 0%;
            transition: width 0.3s, background 0.3s;
            border-radius: 4px;
        }

        .strength-text {
            font-size: 0.7rem;
            margin-top: 0.3rem;
            color: #8b92b0;
        }

        .demo-hint {
            background: #111827;
            border-radius: 0.8rem;
            padding: 0.7rem;
            font-size: 0.7rem;
            text-align: center;
            margin-top: 1rem;
            color: #6c7293;
        }

        @media (max-width: 640px) {
            .auth-container {
                padding: 1.5rem;
            }
            .name-row {
                grid-template-columns: 1fr;
                gap: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="logo">
            <div class="badge">⚔️ DSA FORGE • APTITUDE LAB</div>
            <h1>Pavan X DHEE<br>CODING LAB</h1>
            <p>break the matrix • forge your path</p>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <div class="tab active" data-tab="login">🔐 Login</div>
            <div class="tab" data-tab="signup">🚀 Sign Up</div>
        </div>

        <!-- Login Panel -->
        <div class="form-panel active" id="loginPanel">
            <div class="error-message" id="loginError"></div>
            <form id="loginForm">
                <div class="input-group">
                    <label>Email address <span class="required">*</span></label>
                    <input type="email" id="loginEmail" placeholder="student@pavanxdcl.in" required autocomplete="email">
                </div>

                <div class="input-group">
                    <label>Password <span class="required">*</span></label>
                    <input type="password" id="loginPassword" placeholder="••••••••" required autocomplete="current-password">
                </div>

                <div class="checkbox-group">
                    <label class="checkbox">
                        <input type="checkbox" id="rememberMe"> Remember me
                    </label>
                    <a href="#" class="forgot-link" id="forgotPwd">Forgot password?</a>
                </div>

                <button type="submit" class="auth-btn">→ Login to Dashboard</button>
            </form>
        </div>

        <!-- Signup Panel -->
        <div class="form-panel" id="signupPanel">
            <div class="error-message" id="signupError"></div>
            <div class="success-message" id="signupSuccess"></div>
            <form id="signupForm">
                <div class="name-row">
                    <div class="input-group">
                        <label>First name <span class="required">*</span></label>
                        <input type="text" id="firstName" placeholder="John" required autocomplete="given-name">
                    </div>
                    <div class="input-group">
                        <label>Last name</label>
                        <input type="text" id="lastName" placeholder="Doe" autocomplete="family-name">
                    </div>
                </div>

                <div class="input-group">
                    <label>Email address <span class="required">*</span></label>
                    <input type="email" id="signupEmail" placeholder="student@pavanxdcl.in" required autocomplete="email">
                </div>

                <div class="input-group">
                    <label>Phone number (optional)</label>
                    <input type="tel" id="phone" placeholder="+91 98765 43210" autocomplete="tel">
                </div>

                <div class="input-group">
                    <label>Password <span class="required">*</span></label>
                    <input type="password" id="signupPassword" placeholder="Create a strong password" required autocomplete="new-password">
                    <div class="strength-meter">
                        <div class="strength-bar" id="strengthBar"></div>
                    </div>
                    <div class="strength-text" id="strengthText"></div>
                </div>

                <div class="input-group">
                    <label>Confirm password <span class="required">*</span></label>
                    <input type="password" id="confirmPassword" placeholder="Confirm your password" required>
                </div>

                <div class="input-group">
                    <label>I want to prepare for</label>
                    <select id="goal">
                        <option value="DSA & Coding Interviews">DSA & Coding Interviews</option>
                        <option value="Placement Aptitude">Placement Aptitude</option>
                        <option value="JavaScript Mastery">JavaScript Mastery</option>
                        <option value="FAANG & Advanced Algorithms">FAANG & Advanced Algorithms</option>
                        <option value="All of the above 🔥">All of the above 🔥</option>
                    </select>
                </div>

                <div class="checkbox-group">
                    <label class="checkbox">
                        <input type="checkbox" id="terms" required> I agree to the <a href="#" style="color:#a5b4fc;">Terms</a> & <a href="#" style="color:#a5b4fc;">Privacy Policy</a>
                    </label>
                </div>

                <button type="submit" class="auth-btn">🚀 Create Account →</button>
            </form>
        </div>

        <hr>

        <div class="back-home">
            <a href="index.html">← Back to Home</a>
        </div>

        <div class="demo-hint">
            🔓 DEMO: Create an account or use demo@example.com / demo123
        </div>
    </div>

    <script>
        // ========== STORAGE KEYS ==========
        const STORAGE_KEY = 'pavan_users';
        const CURRENT_USER_KEY = 'pavan_current_user';
        
        // ========== INITIALIZE STORAGE ==========
        function initializeStorage() {
            if (!localStorage.getItem(STORAGE_KEY)) {
                // Create demo users
                const demoUsers = [
                    {
                        id: '1',
                        firstName: 'Demo',
                        lastName: 'User',
                        email: 'demo@example.com',
                        phone: '+91 9876543210',
                        goal: 'All of the above 🔥',
                        password: btoa('demo123'), // Simple encoding for demo
                        createdAt: new Date().toISOString(),
                        lastLogin: null
                    }
                ];
                localStorage.setItem(STORAGE_KEY, JSON.stringify(demoUsers));
            }
        }
        
        // Get all users
        function getUsers() {
            return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        }
        
        // Save users
        function saveUsers(users) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(users));
        }
        
        // Find user by email
        function findUserByEmail(email) {
            const users = getUsers();
            return users.find(u => u.email.toLowerCase() === email.toLowerCase());
        }
        
        // Add new user
        function addUser(userData) {
            const users = getUsers();
            const newUser = {
                id: Date.now().toString(),
                ...userData,
                createdAt: new Date().toISOString(),
                lastLogin: null
            };
            users.push(newUser);
            saveUsers(users);
            return newUser;
        }
        
        // Update last login
        function updateLastLogin(email) {
            const users = getUsers();
            const userIndex = users.findIndex(u => u.email.toLowerCase() === email.toLowerCase());
            if (userIndex !== -1) {
                users[userIndex].lastLogin = new Date().toISOString();
                saveUsers(users);
            }
        }
        
        // Set current session
        function setCurrentUser(user, remember = false) {
            const userData = {
                id: user.id,
                firstName: user.firstName,
                lastName: user.lastName,
                email: user.email,
                phone: user.phone,
                goal: user.goal
            };
            
            if (remember) {
                localStorage.setItem(CURRENT_USER_KEY, JSON.stringify(userData));
            } else {
                sessionStorage.setItem(CURRENT_USER_KEY, JSON.stringify(userData));
            }
        }
        
        // ========== UI HELPERS ==========
        function showError(elementId, message) {
            const errorDiv = document.getElementById(elementId);
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 4000);
        }
        
        function showSuccess(elementId, message) {
            const successDiv = document.getElementById(elementId);
            successDiv.textContent = message;
            successDiv.style.display = 'block';
            setTimeout(() => {
                successDiv.style.display = 'none';
            }, 3000);
        }
        
        // ========== PASSWORD STRENGTH ==========
        function checkPasswordStrength(password) {
            let strength = 0;
            if (password.length >= 6) strength++;
            if (password.length >= 10) strength++;
            if (password.match(/[a-z]/) && password.match(/[A-Z]/)) strength++;
            if (password.match(/[0-9]/)) strength++;
            if (password.match(/[^a-zA-Z0-9]/)) strength++;
            return Math.min(strength, 4);
        }
        
        function updateStrengthMeter() {
            const password = document.getElementById('signupPassword').value;
            const strength = checkPasswordStrength(password);
            const widths = ['0%', '25%', '50%', '75%', '100%'];
            const colors = ['#dc2626', '#f59e0b', '#eab308', '#3b82f6', '#22c55e'];
            const texts = ['Very weak', 'Weak', 'Fair', 'Good', 'Strong'];
            
            const strengthBar = document.getElementById('strengthBar');
            const strengthText = document.getElementById('strengthText');
            
            strengthBar.style.width = widths[strength];
            strengthBar.style.background = colors[strength];
            strengthText.textContent = password ? `Strength: ${texts[strength]}` : '';
        }
        
        // ========== TAB SWITCHING ==========
        function switchTab(tabName) {
            // Update tab styles
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelector(`.tab[data-tab="${tabName}"]`).classList.add('active');
            
            // Update panels
            document.getElementById('loginPanel').classList.remove('active');
            document.getElementById('signupPanel').classList.remove('active');
            
            if (tabName === 'login') {
                document.getElementById('loginPanel').classList.add('active');
            } else {
                document.getElementById('signupPanel').classList.add('active');
            }
            
            // Clear errors
            document.getElementById('loginError').style.display = 'none';
            document.getElementById('signupError').style.display = 'none';
            document.getElementById('signupSuccess').style.display = 'none';
        }
        
        // ========== LOGIN HANDLER ==========
        async function handleLogin(e) {
            e.preventDefault();
            
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            
            if (!email || !password) {
                showError('loginError', 'Please fill in all fields');
                return;
            }
            
            // Find user
            const user = findUserByEmail(email);
            
            if (!user || atob(user.password) !== password) {
                showError('loginError', 'Invalid email or password');
                return;
            }
            
            // Update last login
            updateLastLogin(email);
            
            // Set session
            setCurrentUser(user, rememberMe);
            
            // Show success and redirect
       //     alert(`✅ Welcome back ${user.firstName}!\nRedirecting to dashboard...`);
            window.location.href = 'promax.html';
        }
        
        // ========== SIGNUP HANDLER ==========
        function handleSignup(e) {
            e.preventDefault();
            
            const firstName = document.getElementById('firstName').value.trim();
            const lastName = document.getElementById('lastName').value.trim();
            const email = document.getElementById('signupEmail').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('signupPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const goal = document.getElementById('goal').value;
            const terms = document.getElementById('terms').checked;
            
            // Validation
            if (!firstName || !email || !password || !confirmPassword) {
                showError('signupError', 'Please fill in all required fields (*)');
                return;
            }
            
            // Email validation
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showError('signupError', 'Please enter a valid email address');
                return;
            }
            
            // Check if email exists
            if (findUserByEmail(email)) {
                showError('signupError', 'An account with this email already exists. Please login instead.');
                return;
            }
            
            // Password validation
            if (password.length < 6) {
                showError('signupError', 'Password must be at least 6 characters long');
                return;
            }
            
            if (password !== confirmPassword) {
                showError('signupError', 'Passwords do not match');
                return;
            }
            
            if (!terms) {
                showError('signupError', 'Please agree to the Terms of Service');
                return;
            }
            
            // Create user
            const newUser = addUser({
                firstName: firstName,
                lastName: lastName,
                email: email,
                phone: phone,
                goal: goal,
                password: btoa(password) // Encode for demo (in real app, hash properly)
            });
            
            // Show success
            showSuccess('signupSuccess', `✅ Account created successfully! Welcome ${firstName}! Redirecting to login...`);
            
            // Clear form
            document.getElementById('signupForm').reset();
            
            // Switch to login tab after 2 seconds
            setTimeout(() => {
                switchTab('login');
                document.getElementById('loginEmail').value = email;
                showSuccess('loginError', 'Account created! Please login with your credentials.');
            }, 2000);
        }
        
        // ========== FORGOT PASSWORD ==========
        function handleForgotPassword(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value.trim();
            if (email) {
                const user = findUserByEmail(email);
                if (user) {
                    alert(`📧 Password reset link sent to ${email}\n(Demo: Your password is: ${atob(user.password)})\nIn production, this would send a real email.`);
                } else {
                    alert('Email not found. Please check your email or sign up.');
                }
            } else {
                alert('Please enter your email address to reset password.');
            }
        }
        
        // ========== CHECK IF ALREADY LOGGED IN ==========
        function checkExistingSession() {
            const currentUser = localStorage.getItem(CURRENT_USER_KEY) || sessionStorage.getItem(CURRENT_USER_KEY);
            if (currentUser && window.location.pathname.includes('auth.html')) {
                // User is already logged in and on auth page, redirect to dashboard
                const user = JSON.parse(currentUser);
                if (confirm(`You're already logged in as ${user.email}. Go to dashboard?`)) {
                    window.location.href = 'promax.html';
                }
            }
        }
        
        // ========== EVENT LISTENERS ==========
        document.addEventListener('DOMContentLoaded', () => {
            initializeStorage();
            checkExistingSession();
            
            // Tab switching
            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    switchTab(tab.dataset.tab);
                });
            });
            
            // Login form
            document.getElementById('loginForm').addEventListener('submit', handleLogin);
            
            // Signup form
            document.getElementById('signupForm').addEventListener('submit', handleSignup);
            
            // Password strength
            document.getElementById('signupPassword').addEventListener('input', updateStrengthMeter);
            
            // Confirm password real-time check
            document.getElementById('confirmPassword').addEventListener('input', function() {
                const password = document.getElementById('signupPassword').value;
                const confirm = this.value;
                if (confirm && password !== confirm) {
                    this.style.borderColor = '#ef4444';
                } else {
                    this.style.borderColor = '#2d3a5e';
                }
            });
            
            // Forgot password
            document.getElementById('forgotPwd').addEventListener('click', handleForgotPassword);
        });
    </script>
</body>
</html>
