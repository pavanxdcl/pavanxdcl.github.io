<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Login • Pavan X Dhee Lab (Lite)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #eef2ff;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            color: #1e293b;
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
        }

        /* main card – light theme, soft shadows, airy */
        .login-container {
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
        }

        .brand-card {
            background: #ffffff;
            border-radius: 2rem;
            border: 1px solid rgba(100, 116, 139, 0.2);
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.08), 0 0 0 1px rgba(0, 0, 0, 0.02);
            overflow: hidden;
            transition: transform 0.2s ease;
        }

        /* header area – fresh light gradient inspired by original promax but softer */
        .lab-header {
            background: linear-gradient(135deg, #f8fafc 0%, #ffffff 100%);
            padding: 1.8rem 2rem 1.4rem 2rem;
            border-bottom: 1px solid #e2e8f0;
            text-align: center;
        }

        .lab-header h1 {
            font-size: 1.85rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, #0f172a, #2563eb);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.3rem;
        }

        .lab-header .sub {
            font-size: 0.9rem;
            color: #3b4e6e;
            border-top: 1px dashed #cbd5e1;
            display: inline-block;
            padding-top: 0.6rem;
            margin-top: 0.5rem;
            font-weight: 500;
        }

        .badge-dsa {
            display: inline-block;
            background: #dbeafe;
            backdrop-filter: blur(2px);
            padding: 0.2rem 1rem;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #1e40af;
            margin-top: 0.7rem;
            border: 0.5px solid #bfdbfe;
        }

        /* main login form area - lite & clean */
        .login-form-section {
            padding: 2rem 2rem 2.2rem 2rem;
            background: #ffffff;
        }

        .greeting {
            margin-bottom: 1.8rem;
        }

        .greeting p {
            color: #334155;
            font-size: 0.95rem;
        }

        .greeting strong {
            color: #2563eb;
            font-weight: 600;
        }

        .input-group {
            margin-bottom: 1.6rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .input-group label {
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.3px;
            color: #0f172a;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .input-group label i {
            font-style: normal;
            font-weight: 600;
        }

        .input-field {
            width: 100%;
            background: #f8fafc;
            border: 1.5px solid #e2e8f0;
            border-radius: 1.2rem;
            padding: 0.9rem 1.2rem;
            font-size: 1rem;
            font-family: 'Inter', monospace;
            color: #0f172a;
            transition: all 0.2s;
            outline: none;
        }

        .input-field:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
            background: #ffffff;
        }

        /* login button – bright blue accent, matches light theme */
        .login-btn {
            background: linear-gradient(95deg, #2563eb, #1d4ed8);
            border: none;
            color: white;
            font-weight: 700;
            font-size: 1.05rem;
            padding: 0.9rem 1rem;
            width: 100%;
            border-radius: 2rem;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 0.8rem;
            letter-spacing: 0.3px;
            box-shadow: 0 2px 8px rgba(37, 99, 235, 0.2);
        }

        .login-btn:hover {
            background: linear-gradient(95deg, #1d4ed8, #1e3a8a);
            box-shadow: 0 6px 14px rgba(37, 99, 235, 0.25);
            transform: scale(0.99);
        }

        /* error / info message - lite version */
        .message-area {
            margin-top: 1.2rem;
            font-size: 0.85rem;
            text-align: center;
            padding: 0.5rem;
            border-radius: 2rem;
            background: #f1f5f9;
            color: #b45309;
            font-weight: 500;
        }

        .demo-hint {
            background: #f1f5f9;
            border-radius: 1rem;
            margin-top: 1.4rem;
            padding: 0.8rem 1rem;
            font-size: 0.75rem;
            border-left: 3px solid #3b82f6;
            color: #1e293b;
        }

        .demo-hint code {
            background: #e2e8f0;
            padding: 0.2rem 0.5rem;
            border-radius: 12px;
            font-family: monospace;
            color: #0f172a;
        }

        footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.7rem;
            color: #64748b;
        }

        /* responsive */
        @media (max-width: 520px) {
            .login-form-section {
                padding: 1.6rem;
            }
            .lab-header {
                padding: 1.4rem 1rem;
            }
            .lab-header h1 {
                font-size: 1.5rem;
            }
        }

        .badge-icon {
            background: #eef2ff;
            border-radius: 30px;
            font-size: 0.7rem;
            padding: 0.2rem 0.7rem;
        }
    </style>
</head>
<body>
<div class="login-container">
    <div class="brand-card">
        <!-- header inspired by original, but light theme variant -->
        <div class="lab-header">
            <h1>⚡ Pavan X Dhee<br>Coding Lab</h1>
            <div class="sub">DSA : Pro Max</div>
            <div class="badge-dsa">🔐 secure portal • lab access</div>
        </div>

        <!-- login section -->
        <div class="login-form-section">
            <div class="greeting">
                <p>✨ <strong>Authorized Learner Zone</strong><br>Use your lab credentials to continue.</p>
            </div>

            <form id="loginForm" action="#" method="post">
                <div class="input-group">
                    <label><i>👤</i> Username / Email</label>
                    <input type="text" id="username" class="input-field" placeholder="student103@pavanxdcl" autocomplete="off">
                </div>

                <div class="input-group">
                    <label><i>🔒</i> Password</label>
                    <input type="password" id="password" class="input-field" placeholder="••••••••">
                </div>

                <button type="submit" class="login-btn">➡️ ACCESS DSA PRO MAX</button>
                <div id="loginMessage" class="message-area"></div>
            </form>

            <div class="demo-hint">
                💡 <strong>To access this website Contact: 7760876386 [Pavan Prakash]</strong><br>
                <br>
         </div>
        </div>
    </div>
    <footer>
        🔥 DSA : Pro Max • Two Pointer | Binary Search | Advanced Templates
    </footer>
</div>

<script>
    (function() {
        // --- exact expected credentials ---
        const VALID_USERNAME = "student103@pavanxdcl";
        const VALID_PASSWORD = "student103@pavanxdcl";
        

        const loginForm = document.getElementById('loginForm');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const messageDiv = document.getElementById('loginMessage');

        // helper to show message (light theme friendly)
        function setMessage(msg, isError = true) {
            if (!messageDiv) return;
            messageDiv.innerHTML = msg;
            if (isError) {
                messageDiv.style.color = '#b45309';
                messageDiv.style.background = '#fffbeb';
                messageDiv.style.border = '1px solid #fed7aa';
            } else {
                messageDiv.style.color = '#15803d';
                messageDiv.style.background = '#ecfdf5';
                messageDiv.style.border = '1px solid #bbf7d0';
            }
        }

        function clearMessage() {
            if (messageDiv) {
                messageDiv.innerHTML = '';
                messageDiv.style.color = '#b45309';
                messageDiv.style.background = '#f1f5f9';
                messageDiv.style.border = 'none';
            }
        }

        // redirect to the exact URL given 
        function redirectToCourse() {
            window.location.href = "https://pavanxdcl.github.io/promax.html";
        }

        // validation and submission handler
        function handleLogin(event) {
            event.preventDefault();

            const enteredUsername = usernameInput ? usernameInput.value.trim() : '';
            const enteredPassword = passwordInput ? passwordInput.value : '';

            clearMessage();

            // basic empty checks
            if (enteredUsername === '' || enteredPassword === '') {
                setMessage('⚠️ Both username and password are required.', true);
                return;
            }

            // strict comparison (case-sensitive as per requirement)
            if (enteredUsername === VALID_USERNAME && enteredPassword === VALID_PASSWORD) {
                // success message then redirect 
                setMessage('✅ Access granted! Redirecting to DSA Pro Max dashboard...', false);
                setTimeout(() => {
                    redirectToCourse();
                }, 800);
            } else {
                setMessage('❌ Invalid username or password. Please use the exact demo credentials.', true);
                if (passwordInput) passwordInput.value = '';
                passwordInput?.focus();
            }
        }

        if (loginForm) {
            loginForm.addEventListener('submit', handleLogin);
        }
    })();
</script>
</body>
</html>
